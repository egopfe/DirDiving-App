name: Build

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - main-iOS
      - codex/experimental-features
      - codex/ios-experimental-features
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare iOS-only CI project
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          if [[ "$BRANCH_NAME" == *"ios"* || "$BRANCH_NAME" == *"iOS"* ]]; then
            cat > project.yml <<'YAML'
          name: DIRDiving
          options:
            bundleIdPrefix: com.egopfe
            xcodeVersion: "15.4"
            deploymentTarget:
              iOS: "17.0"
          targets:
            DIRDiving iOS:
              type: application
              platform: iOS
              sources:
                - iOSApp
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.egopfe.dirdiving.ios
                  DEVELOPMENT_TEAM: C6FKKPB6A9
                  CODE_SIGN_STYLE: Automatic
                  INFOPLIST_FILE: iOSApp/App/Info.plist
                  CODE_SIGN_ENTITLEMENTS: iOSApp/Config/DIRDivingiOS.entitlements
                  PRODUCT_NAME: DIR DIVING
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
              dependencies:
                - sdk: Charts.framework
                - sdk: WatchConnectivity.framework
                - sdk: CoreLocation.framework
          schemes:
            DIRDiving iOS:
              build:
                targets:
                  DIRDiving iOS: all
          YAML
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify generated project has no drift
        run: git diff --exit-code -- DIRDiving.xcodeproj

      - name: Verify MAIN target isolation policy
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          if [[ "$BRANCH_NAME" == "main" ]]; then
            ./Scripts/check_main_target_isolation.sh
          else
            echo "Skipping MAIN isolation check for branch: $BRANCH_NAME"
          fi

      - name: Secret scan
        run: ./Scripts/check_secrets.sh

      - name: Build watchOS target
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          if [[ "$BRANCH_NAME" == *"ios"* || "$BRANCH_NAME" == *"iOS"* ]]; then
            echo "Skipping watch build for iOS-focused branch: $BRANCH_NAME"
          elif grep -q "DIRDiving Watch App" project.yml; then
            xcodebuild build \
              -project DIRDiving.xcodeproj \
              -scheme "DIRDiving Watch App" \
              -destination "generic/platform=watchOS Simulator" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
          else
            echo "Skipping watch build: no watch target in project.yml"
          fi

      - name: Build iOS target
        run: |
          if grep -q "DIRDiving iOS" project.yml; then
            xcodebuild build \
              -project DIRDiving.xcodeproj \
              -scheme "DIRDiving iOS" \
              -destination "generic/platform=iOS Simulator" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
          else
            echo "Skipping iOS build: no iOS target in project.yml"
          fi

      - name: Test iOS algorithm scheme
        run: |
          if grep -q "DIRDiving iOS Algorithm Tests" project.yml; then
            xcodebuild test \
              -project DIRDiving.xcodeproj \
              -scheme "DIRDiving iOS Algorithm Tests" \
              -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
          else
            echo "Skipping iOS algorithm tests: no test scheme in project.yml"
          fi

      - name: Test watchOS algorithm scheme
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          if [[ "$BRANCH_NAME" == *"ios"* || "$BRANCH_NAME" == *"iOS"* ]]; then
            echo "Skipping watch tests for iOS-focused branch: $BRANCH_NAME"
          elif grep -q "DIRDiving Watch Algorithm Tests" project.yml; then
            xcodebuild test \
              -project DIRDiving.xcodeproj \
              -scheme "DIRDiving Watch Algorithm Tests" \
              -destination "platform=watchOS Simulator,name=Apple Watch Ultra 2 (49mm)" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
          else
            echo "Skipping watch algorithm tests: no test scheme in project.yml"
          fi
