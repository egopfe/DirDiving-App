      - Utils/FullComputerLivePanelFixtures.swift
      - Utils/FullComputerMockupReferenceMatrix.swift
      - Utils/FullComputerPrediveReadiness.swift
      - Utils/FullComputerReleaseHardTolerances.swift
      - Services/FullComputerDecoHapticCoordinator.swift
      - Services/FullComputerPrediveConfigurationStore.swift
      - Services/FullComputerRuntimeEngine.swift
      - Utils/WatchModeSelectionPreferences.swift
      - Services/DIRActivitySelectionStore.swift
      - Services/AppNavigationStore.swift
      - Models/AppPage.swift
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.egopfe.dirdiving.watch.algorithmtests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: C6FKKPB6A9
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DIRDivingWatchApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DIRDivingWatchApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: DIRDiving Watch App
      - sdk: XCTest.framework
      - sdk: WatchKit.framework
