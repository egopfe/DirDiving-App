name: DIRDiving
options:
  bundleIdPrefix: com.egopfe
  deploymentTarget:
    iOS: "17.0"
targets:
  DIRDiving iOS:
    type: application
    platform: iOS
    sources:
      - iOSApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.egopfe.dirdiving.ios
        DEVELOPMENT_TEAM: C6FKKPB6A9
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: iOSApp/App/Info.plist
        PRODUCT_NAME: DIR DIVING
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: Charts.framework
      - sdk: WatchConnectivity.framework
      - sdk: CoreLocation.framework
