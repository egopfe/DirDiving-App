name: DIRDiving
options:
  bundleIdPrefix: com.egopfe
  xcodeVersion: "15.4"
  deploymentTarget:
    iOS: "17.0"
targets:
  DIRDiving iOS:
    type: application
    platform: iOS
    sources:
      - iOSApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.egopfe.dirdiving.ios
        DEVELOPMENT_TEAM: C6FKKPB6A9
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: iOSApp/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: iOSApp/Config/DIRDivingiOS.entitlements
        PRODUCT_NAME: DIR DIVING
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: Charts.framework
      - sdk: WatchConnectivity.framework
      - sdk: CoreLocation.framework
  DIRDiving Watch Algorithm Tests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - Tests/WatchAlgorithmTests
      - Models/DiveSample.swift
      - Models/DiveSession.swift
      - Models/GPSPoint.swift
      - Models/AscentRateLimits.swift
      - Models/AscentStatus.swift
      - Utils/DIRUnitPreference.swift
      - Utils/DIRUnitConversions.swift
      - Utils/DepthSafetyConfiguration.swift
      - Utils/DiveAlgorithmConfiguration.swift
      - Utils/DiveLogbookPolicy.swift
      - Utils/GPSFallbackPolicy.swift
      - Utils/DepthSampleValidation.swift
      - Utils/DiveLifecycleAlgorithm.swift
      - Utils/DiveSessionAlgorithmValidator.swift
      - Utils/DiveSessionMerge.swift
      - Utils/MonotonicElapsedClock.swift
      - Utils/GPSConfirmationPresentation.swift
      - Utils/DiveSessionPersistenceClass.swift
      - Models/DiveGPSConfirmation.swift
      - Services/SubsurfaceExportService.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.egopfe.dirdiving.watch.algorithmtests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: C6FKKPB6A9
    dependencies:
      - sdk: XCTest.framework
  DIRDiving iOS Algorithm Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/iOSAlgorithmTests
      - iOSApp/Models/DemoDiveCatalog.swift
      - iOSApp/Models/DivePlan.swift
      - iOSApp/Models/DiveSample.swift
      - iOSApp/Models/DiveSession.swift
      - iOSApp/Models/GasPlan.swift
      - iOSApp/Models/GPSPoint.swift
      - iOSApp/Models/TankSize.swift
      - iOSApp/Algorithms/Buhlmann/BuhlmannConstants.swift
      - iOSApp/Algorithms/Buhlmann/BuhlmannGas.swift
      - iOSApp/Algorithms/Buhlmann/BuhlmannTissueModel.swift
      - iOSApp/Algorithms/Buhlmann/BuhlmannEngine.swift
      - iOSApp/Services/BuhlmannPlanner.swift
      - iOSApp/Services/CloudSyncStore.swift
      - iOSApp/Services/DiveImportService.swift
      - iOSApp/Services/GasPlanningService.swift
      - iOSApp/Services/OxygenExposureModels.swift
      - iOSApp/Services/PlannerGasSchedule.swift
      - iOSApp/Services/PlannerMODValidator.swift
      - iOSApp/Services/PlannerEnvironment.swift
      - iOSApp/Services/PlannerService.swift
      - iOSApp/Services/RepetitiveDivePlannerService.swift
      - iOSApp/Services/RouteSummaryService.swift
      - iOSApp/Services/ScheduleGasConsumptionService.swift
      - iOSApp/Services/SubsurfaceExportService.swift
      - iOSApp/Services/WatchDiveSyncCodec.swift
      - iOSApp/Services/WatchSyncAuth.swift
      - iOSApp/Utils/DiveProfileMath.swift
      - iOSApp/Utils/DiveSessionAlgorithmValidator.swift
      - iOSApp/Utils/DiveSessionMerge.swift
      - iOSApp/Utils/DiveSessionMergeConflict.swift
      - iOSApp/Utils/GasMixValidator.swift
      - iOSApp/Utils/IOSAlgorithmConfiguration.swift
      - iOSApp/Utils/IOSDiveLogbookPolicy.swift
      - iOSApp/Utils/IOSUnitConversions.swift
      - iOSApp/Utils/PlannerInputValidator.swift
      - iOSApp/Utils/PlanCalculationCompleteness.swift
      - iOSApp/Utils/PlannerResultState.swift
      - iOSApp/Utils/WatchSyncSessionDiff.swift
      - iOSApp/Utils/CloudSyncNotifications.swift
      - iOSApp/Utils/WatchSyncNotifications.swift
      - iOSApp/Utils/WatchSyncKeys.swift
    resources:
      - path: Tests/iOSAlgorithmTests/Fixtures
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.egopfe.dirdiving.ios.algorithmtests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: C6FKKPB6A9
    dependencies:
      - sdk: XCTest.framework
      - sdk: CryptoKit.framework
      - sdk: Security.framework
      - sdk: WatchConnectivity.framework
schemes:
  DIRDiving iOS:
    build:
      targets:
        DIRDiving iOS: all
