name: DIRDiving
options:
  bundleIdPrefix: com.egopfe
  xcodeVersion: "15.4"
  deploymentTarget:
    watchOS: "10.0"
    iOS: "17.0"
targets:
  DIRDiving Watch App:
    type: application
    platform: watchOS
    sources:
      - App
      - path: Models
        excludes:
          - ExplorationModels.swift
          - BuddyAssistMessage.swift
          - BuddyPairingHandshake.swift
      - path: Services
        excludes:
          - ExplorationStore.swift
          - BuddyAssistService.swift
          - BuddyAssistPeripheralService.swift
          - BuddyPairingKeyAgreement.swift
          - SecureBuddyStore.swift
      - path: Views
        excludes:
          - ApneaView.swift
          - SnorkelingView.swift
          - BuddyAssistView.swift
          - ExperimentalConceptsView.swift
      - path: Utils
        excludes:
          - ExperimentalFeatures.swift
      # Explicit membership for algorithm/runtime core (prevents stale-xcodeproj "not in scope" errors).
      - Utils/MissionModeRuntimeProfile.swift
      - Utils/DiveDepthMeasurementIngestion.swift
      - Utils/GPSFallbackPolicy.swift
      - Utils/WatchNavigationHints.swift
      - Utils/DiveSessionPersistenceClass.swift
      - Utils/DepthSampleValidation.swift
      - Utils/DiveLifecycleAlgorithm.swift
      - Utils/MonotonicElapsedClock.swift
      - Utils/GPSConfirmationPresentation.swift
      - Utils/DiveAlgorithmConfiguration.swift
      - Utils/DiveAlgorithmSelfCheck.swift
      - Utils/DiveSessionAlgorithmValidator.swift
      - Utils/SensorSourceMode.swift
      - Utils/DepthSensorSourceResolution.swift
      - Utils/DeveloperSettings.swift
      - Utils/DeveloperVersionUnlock.swift
      - Services/DepthSensorProvider.swift
      - Services/SensorProviderFactory.swift
      - Services/AppleDepthSensorProvider.swift
      - Services/MockDepthSensorProvider.swift
      - Models/DiveGPSConfirmation.swift
      - Services/AscentSafetyHapticCoordinator.swift
      - Services/GPSManager.swift
      - Services/FullComputerRuntimeEngine.swift
      - Utils/FullComputerRuntimeConfiguration.swift
      - Utils/FullComputerRuntimeModels.swift
      - Utils/FullComputerRuntimePlan.swift
      - Utils/FullComputerDecoSolverModels.swift
      - Utils/FullComputerDecoSolver.swift
      - Utils/FullComputerDecoStopConfiguration.swift
      - Utils/FullComputerDecoStopStateMachine.swift
      - Utils/FullComputerGasSwitchModels.swift
      - Utils/FullComputerGasSwitchPolicy.swift
      - Utils/FullComputerGasProfileValidator.swift
      - Utils/FullComputerRuntimeCheckpoint.swift
      - Utils/FullComputerRuntimeLogbookAccumulator.swift
      - Utils/FullComputerLivePanelFixtures.swift
      - Utils/FullComputerMockupReferenceMatrix.swift
      - Utils/FullComputerPrediveReadiness.swift
      - Utils/FullComputerReleaseHardTolerances.swift
      - Services/FullComputerDecoHapticCoordinator.swift
      - Services/FullComputerPrediveConfigurationStore.swift
      - Resources
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.egopfe.dirdiving.ios.watch
        DEVELOPMENT_TEAM: C6FKKPB6A9
        CODE_SIGN_STYLE: Automatic
        ENABLE_TESTABILITY: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: App/Info.plist
        INFOPLIST_KEY_CFBundleIdentifier: com.egopfe.dirdiving.ios.watch
        CODE_SIGN_ENTITLEMENTS: Config/DIRDiving.entitlements
        PRODUCT_NAME: DIRDivingWatchApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.egopfe.dirdiving.ios
    dependencies:
      - sdk: CoreMotion.framework
      - sdk: CoreLocation.framework
      - sdk: Security.framework
      - sdk: WatchConnectivity.framework
      - sdk: WatchKit.framework
      - sdk: Charts.framework
      - sdk: AppIntents.framework
  DIRDiving iOS:
    type: application
    platform: iOS
    sources:
      - Models/PlannerBriefingCard.swift
      - Models/DIRModesAndStartup.swift
      - Utils/MonotonicElapsedClock.swift
      - path: Shared
      - path: iOSApp
        excludes:
          - Models/ExplorationModels.swift
          - Models/BuddyExperimentalModels.swift
          - Services/ExplorationPlanningStore.swift
          - Services/BuddyExperimentalStore.swift
          - Views/ExplorationCenterView.swift
          - Views/ExperimentalFutureConceptsView.swift
          - Views/BuddyExperimentalView.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.egopfe.dirdiving.ios
        DEVELOPMENT_TEAM: C6FKKPB6A9
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: iOSApp/App/Info.plist
        INFOPLIST_KEY_CFBundleIdentifier: com.egopfe.dirdiving.ios
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: iOSApp/Config/DIRDivingiOS.entitlements
        PRODUCT_NAME: DIRDivingiOSApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: DIRDiving Watch App
        embed: true
      - sdk: Charts.framework
      - sdk: WatchConnectivity.framework
      - sdk: CoreLocation.framework
      - sdk: CoreMotion.framework
